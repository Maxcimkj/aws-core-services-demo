spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: note-manager
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.eu-north-1.amazonaws.com/eu-north-1_Oe4Ubp5pI

aws:
  region: eu-north-1

server:
  port: 8080

logging:
  level:
    software.amazon.awssdk: WARN
    com.example.note_manager: INFO
    root: INFO
