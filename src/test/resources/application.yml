spring:
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  profiles:
    active: test
aws:
  region: eu-north-1
  sqs:
    queue-url: https://sqs.eu-north-1.amazonaws.com/123456789012/test-queue
  secrets:
    postgres:
      secret-id: note-manager-database-secrets
