spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: note-manager
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.eu-north-1.amazonaws.com/eu-north-1_Oe4Ubp5pI
aws:
  region: eu-north-1
  secrets:
    postgres:
      secret-id: note-manager-database-secrets
server:
  port: 8080
logging:
  level:
    software.amazon.awssdk: WARN
    com.example.note_manager: INFO
    root: INFO
